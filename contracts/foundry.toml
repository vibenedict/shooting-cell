[profile.default]
src = "../src/contracts"
test = "test"
out = "out"
cache_path = "cache"
libs = ["lib"]
allow_paths = ["../src/contracts"]
remappings = ["@contracts/=../src/contracts/", "forge-std/=lib/forge-std/src/"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
alfajores = "https://alfajores-forno.celo-testnet.org"
celo = "https://forno.celo.org"
